{% extends 'main/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Muda Password — SI Schools{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{% url 'user-profile' %}">Perfil</a></li>
<li class="breadcrumb-item active">Muda Password</li>
{% endblock %}

{% block content %}
<div class="mb-3">
    <h5 class="fw-bold mb-0">
        <i class="bi bi-key me-2"></i>Muda Password
    </h5>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
