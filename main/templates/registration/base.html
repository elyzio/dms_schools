{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SI Schools{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'assets/css/custom.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">

<div class="min-vh-100 d-flex flex-column align-items-center justify-content-center py-4 px-3">
    <div class="card shadow-sm w-100" style="max-width: 440px;">
        <div class="card-body p-4">

            <!-- Logo -->
            <div class="text-center mb-4">
                <i class="bi bi-mortarboard-fill text-primary" style="font-size: 2.5rem;"></i>
                <h4 class="mt-2 mb-0 fw-bold">SI Schools</h4>
                <p class="text-muted small mb-0">{% block subtitle %}Sistema Informasaun Eskola{% endblock %}</p>
            </div>

            {% block content %}{% endblock %}

        </div>
    </div>

    <!-- Auth footer -->
    <p class="text-center text-muted mt-3 mb-0" style="font-size: 0.78rem;">
        &copy; {% now "Y" %} SI Schools &mdash; Sistema Informasaun Eskola
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
