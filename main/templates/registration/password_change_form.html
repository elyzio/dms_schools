{% extends 'registration/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Muda Password — SI Schools{% endblock %}
{% block subtitle %}Muda Password{% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-key me-1"></i>Salva
        </button>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Kansela</a>
    </div>
</form>
{% endblock %}
